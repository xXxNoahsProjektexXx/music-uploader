name: Next.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Repo klonen
        uses: actions/checkout@v4

      - name: 🟢 Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Dependencies installieren
        run: npm ci

      - name: 🏗️ Build
        run: npm run build

      - name: ✅ Lint (optional)
        run: npm run lint || true
